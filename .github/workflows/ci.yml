name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test Go packages
        run: go test ./...

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm ci
      - name: Build desktop bundle
        run: npm run build
