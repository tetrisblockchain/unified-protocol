<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniFied Search | Ledger Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans">
    <div class="max-w-4xl mx-auto pt-20 px-6 text-center">
        <h2 class="text-4xl font-bold mb-8">Search the <span class="text-blue-500">UniFied</span> Ledger</h2>
        
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="queryInput" placeholder="Keywords, UFI address, or URL..." 
                class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            <button onclick="executeSearch()" class="absolute right-3 top-2.5 bg-blue-600 hover:bg-blue-700 p-2.5 rounded-xl transition">
                🔍
            </button>
        </div>

        <div id="resultsList" class="mt-12 text-left space-y-6">
            <!-- Results will appear here dynamically -->
            <p class="text-gray-500 text-center">Enter a query to see real-time blockchain index data.</p>
        </div>
    </div>

    <script>
        async function executeSearch() {
            const query = document.getElementById('queryInput').value;
            const resultsList = document.getElementById('resultsList');
            
            if(!query) return;

            resultsList.innerHTML = '<p class="text-center animate-pulse">Querying decentralized nodes...</p>';

            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                const results = await response.json();

                if (results.length === 0) {
                    resultsList.innerHTML = '<p class="text-center text-gray-500">No results found in the current block range.</p>';
                    return;
                }

                resultsList.innerHTML = results.map(res => `
                    <div class="p-6 border border-gray-800 rounded-2xl bg-gray-900/40 hover:bg-gray-900 transition">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-blue-400 font-bold text-xl">${res.title || "Untitled Page"}</h3>
                            <span class="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-800">UFI Verified</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-4">${res.snippet || "No description available."}</p>
                        <div class="text-[11px] font-mono text-gray-600 flex space-x-4">
                            <span>Block: #${res.blockNumber}</span>
                            <span>SimHash: ${res.hash.substring(0, 16)}...</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                resultsList.innerHTML = '<p class="text-center text-red-500">Error: Could not reach the UniFied Gateway.</p>';
            }
        }
    </script>
</body>
</html>
